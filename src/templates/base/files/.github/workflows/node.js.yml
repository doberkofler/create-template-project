name: Node.js CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # [PM_SETUP]
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: '{{packageManager}}'
      - run: '{{installCommand}}'
      # [PLAYWRIGHT_SETUP]
      - run: '{{packageManager}} run ci'
